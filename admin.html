<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理画面 | haha.camera</title>
<style>
  *{box-sizing:border-box;}
  body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:#FAF5EF;color:#3A332C;margin:0;padding:24px;}
  .wrap{max-width:720px;margin:0 auto;}
  h1{font-size:1.3rem;margin-bottom:24px;}
  .card{background:#fff;border-radius:10px;padding:24px;margin-bottom:20px;box-shadow:0 8px 24px -16px rgba(0,0,0,.2);}
  label{display:block;font-size:.85rem;color:#6B6058;margin:14px 0 6px;font-weight:600;}
  label:first-child{margin-top:0;}
  input[type=text], input[type=password], textarea{
    width:100%;padding:10px 12px;border:1px solid #e0d8cc;border-radius:6px;font-size:.95rem;font-family:inherit;
  }
  textarea{resize:vertical;min-height:70px;}
  .img-preview{width:120px;height:80px;object-fit:cover;border-radius:6px;background:#eee;margin-top:8px;display:block;}
  .row{display:flex;gap:10px;align-items:flex-end;}
  .row > div{flex:1;}
  .btn{
    display:inline-block;padding:10px 22px;border-radius:30px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;
  }
  .btn-primary{background:#C98F76;color:#fff;}
  .btn-primary:hover{background:#A86B53;}
  .btn-outline{background:#fff;border:1px solid #C98F76;color:#A86B53;}
  .btn-danger{background:#fff;border:1px solid #c66;color:#c66;font-size:.8rem;padding:6px 14px;}
  .service-item{border:1px solid #eee0d0;border-radius:8px;padding:16px;margin-bottom:14px;position:relative;}
  .gallery-item{display:inline-block;position:relative;margin:0 8px 8px 0;}
  .gallery-item img{width:90px;height:90px;object-fit:cover;border-radius:6px;}
  .gallery-item button{position:absolute;top:-6px;right:-6px;background:#c66;color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;line-height:1;}
  #status{margin-top:14px;font-size:.85rem;}
  #loginScreen{max-width:340px;margin:80px auto;text-align:center;}
  .save-bar{position:sticky;bottom:0;background:#FAF5EF;padding:16px 0;display:flex;justify-content:center;}
</style>
</head>
<body>

<div id="loginScreen">
  <h1>管理画面ログイン</h1>
  <input type="password" id="passInput" placeholder="パスワード">
  <button class="btn btn-primary" style="margin-top:14px;width:100%;" onclick="login()">ログイン</button>
  <div id="loginErr" style="color:#c66;margin-top:10px;font-size:.85rem;"></div>
</div>

<div class="wrap" id="adminScreen" style="display:none;">
  <h1>ホームページ編集</h1>

  <div class="card">
    <h3>トップ（ヒーロー）</h3>
    <label>見出し（改行できます）</label>
    <textarea id="heroTitle"></textarea>
    <label>説明文</label>
    <textarea id="heroText"></textarea>
    <label>背景画像</label>
    <input type="file" accept="image/*" onchange="uploadImage(event,'heroImage')">
    <img class="img-preview" id="heroImagePreview">
    <label>背景画像（スマホ表示用・任意。スマホで見た時だけこちらの写真が使われます。空の場合は上の写真が使われます）</label>
    <input type="file" accept="image/*" onchange="uploadImage(event,'heroImageMobile')">
    <img class="img-preview" id="heroImageMobilePreview">
  </div>

  <div class="card">
    <h3>自己紹介</h3>
    <label>見出し</label>
    <input type="text" id="aboutTitle">
    <label>説明文</label>
    <textarea id="aboutText"></textarea>
    <label>写真</label>
    <input type="file" accept="image/*" onchange="uploadImage(event,'aboutImage')">
    <img class="img-preview" id="aboutImagePreview">
  </div>

  <div class="card">
    <h3>撮影プラン</h3>
    <div id="serviceList"></div>
    <button class="btn btn-outline" onclick="addService()">+ プランを追加</button>
  </div>

  <div class="card">
    <h3>アルバム等オプション商品</h3>
    <div id="optionList"></div>
    <button class="btn btn-outline" onclick="addOption()">+ 商品を追加</button>
  </div>

  <div class="card">
    <h3>注意事項・キャンセルポリシー</h3>
    <label>本文（トップページの「注意事項」セクションに表示されます）</label>
    <textarea id="notice" style="min-height:160px;"></textarea>
  </div>

  <div class="card">
    <h3>リンク</h3>
    <label>LINEのURL</label>
    <input type="text" id="lineUrl">
    <label>InstagramのURL</label>
    <input type="text" id="instagramUrl">
  </div>

  <div class="save-bar">
    <button class="btn btn-primary" onclick="save()">保存して公開する</button>
  </div>
  <div id="status"></div>
</div>

<script>
// 【カスタマイズ】Worker URLをあなたのものに変更してください
const W = 'https://haha-camera-site.kurage-ni-naritaiii.workers.dev'
let password = ''
let data = null

async function login() {
  password = document.getElementById('passInput').value
  document.getElementById('loginErr').textContent = ''
  let d
  try {
    const res = await fetch(`${W}/api/content`)
    d = await res.json()
  } catch (e) {
    document.getElementById('loginErr').textContent = '読み込みに失敗しました'
    return
  }
  data = d
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('adminScreen').style.display = 'block'
  const status = document.getElementById('status')
  status.textContent = '古い写真データを確認中…'
  const migrated = await migrateImages((i, total) => {
    status.textContent = `古い写真データを整理中… (${i}/${total})`
  })
  fillForm()
  if (migrated > 0) {
    status.textContent = `古い写真データ ${migrated} 件を整理しました。保存しています…`
    try {
      const res = await fetch(`${W}/api/content`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body: JSON.stringify(data),
      })
      const r = await res.json()
      status.textContent = r.ok ? `✅ 古い写真データ ${migrated} 件を整理して保存しました。続けて編集できます。` : '❌ 整理した内容の保存に失敗しました。もう一度「保存して公開する」を押してください。'
    } catch (e) {
      status.textContent = '❌ 整理した内容の保存に失敗しました。もう一度「保存して公開する」を押してください。'
    }
  } else {
    status.textContent = ''
  }
}

function isDataUrl(s) { return typeof s === 'string' && s.startsWith('data:') }

async function migrateImages(onProgress) {
  const tasks = []
  const addTask = (getter, setter) => tasks.push({ getter, setter })
  if (isDataUrl(data.heroImage)) addTask(() => data.heroImage, v => data.heroImage = v)
  if (isDataUrl(data.aboutImage)) addTask(() => data.aboutImage, v => data.aboutImage = v)
  ;(data.services || []).forEach(s => {
    if (isDataUrl(s.image)) addTask(() => s.image, v => s.image = v)
    ;(s.images || []).forEach((img, idx) => { if (isDataUrl(img)) addTask(() => s.images[idx], v => s.images[idx] = v) })
    ;(s.subplans || []).forEach(sp => {
      if (isDataUrl(sp.image)) addTask(() => sp.image, v => sp.image = v)
      ;(sp.images || []).forEach((img, idx) => { if (isDataUrl(img)) addTask(() => sp.images[idx], v => sp.images[idx] = v) })
      if (isDataUrl(sp.video)) addTask(() => sp.video, v => sp.video = v)
    })
  })
  ;(data.options || []).forEach(o => { if (isDataUrl(o.image)) addTask(() => o.image, v => o.image = v) })

  for (let i = 0; i < tasks.length; i++) {
    if (onProgress) onProgress(i + 1, tasks.length)
    const t = tasks[i]
    try {
      const res = await fetch(`${W}/api/image`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body: JSON.stringify({ dataUrl: t.getter() }),
      })
      const r = await res.json()
      if (r.ok) t.setter(`${W}${r.url}`)
    } catch (e) { /* 失敗した分はそのまま残し、次に進む */ }
  }
  return tasks.length
}

function fillForm() {
  document.getElementById('heroTitle').value = data.heroTitle || ''
  document.getElementById('heroText').value = data.heroText || ''
  document.getElementById('heroImagePreview').src = data.heroImage || ''
  document.getElementById('heroImageMobilePreview').src = data.heroImageMobile || ''
  document.getElementById('aboutTitle').value = data.aboutTitle || ''
  document.getElementById('aboutText').value = data.aboutText || ''
  document.getElementById('aboutImagePreview').src = data.aboutImage || ''
  document.getElementById('lineUrl').value = data.lineUrl || ''
  document.getElementById('instagramUrl').value = data.instagramUrl || ''
  document.getElementById('notice').value = data.notice || ''
  renderServices()
  renderOptions()
}

function renderServices() {
  const list = document.getElementById('serviceList')
  list.innerHTML = (data.services || []).map((s, i) => `
    <div class="service-item">
      <button class="btn-danger" style="position:absolute;top:10px;right:10px;" onclick="removeService(${i})">削除</button>
      <label>プラン名</label>
      <input type="text" value="${esc(s.title)}" oninput="data.services[${i}].title=this.value">
      <label>説明</label>
      <input type="text" value="${esc(s.desc)}" oninput="data.services[${i}].desc=this.value">
      <label>写真（複数枚アップロードできます。1枚目がカード一覧の表紙になります）</label>
      <div id="serviceImages${i}">${renderServiceImages(s, i)}</div>
      <input type="file" accept="image/*" onchange="addServiceImage(event,${i})">

      <label>動画（任意。サブプランを使わない場合はこちらに直接アップロードできます。20MB以下にしてください）</label>
      ${s.video ? `<video src="${s.video}" controls style="width:200px;border-radius:6px;display:block;margin-top:6px;"></video><button type="button" class="btn-danger" style="margin-top:6px;" onclick="removeServiceVideo(${i})">動画を削除</button>` : ''}
      <input type="file" accept="video/*" onchange="uploadServiceVideo(event,${i})">

      <label style="margin-top:20px;">サブプラン（プラン内に複数の料金プランがある場合に使います。例：「日常ニューボーンフォト」「おくるみかごプラン」など。それぞれに写真をつけられます）</label>
      <div id="subplanList${i}">${renderSubplans(s, i)}</div>
      <button type="button" class="btn btn-outline" style="margin-top:6px;" onclick="addSubplan(${i})">+ サブプランを追加</button>

      <label style="margin-top:20px;">詳細・料金（サブプランを使わない場合はこちらに直接書いてください）</label>
      <textarea style="min-height:140px;" oninput="data.services[${i}].detail=this.value">${esc(s.detail)}</textarea>
    </div>
  `).join('')
}

function renderSubplans(s, i) {
  const subplans = s.subplans || []
  return subplans.map((sp, j) => `
    <div class="service-item" style="background:#fdfaf6;">
      <button class="btn-danger" style="position:absolute;top:10px;right:10px;" onclick="removeSubplan(${i},${j})">削除</button>
      <label>サブプラン名</label>
      <input type="text" value="${esc(sp.title)}" oninput="data.services[${i}].subplans[${j}].title=this.value">
      <label>写真（複数枚アップロードできます）</label>
      <div id="subplanImages${i}_${j}">${renderSubplanImages(sp, i, j)}</div>
      <input type="file" accept="image/*" onchange="addSubplanImage(event,${i},${j})">
      <label>動画（任意。スマホで撮った短い動画などをそのままアップロードできます。20MB以下にしてください）</label>
      ${sp.video ? `<video src="${sp.video}" controls style="width:200px;border-radius:6px;display:block;margin-top:6px;"></video><button type="button" class="btn-danger" style="margin-top:6px;" onclick="removeSubplanVideo(${i},${j})">動画を削除</button>` : ''}
      <input type="file" accept="video/*" onchange="uploadSubplanVideo(event,${i},${j})">
      <label>詳細・料金</label>
      <textarea style="min-height:110px;" oninput="data.services[${i}].subplans[${j}].detail=this.value">${esc(sp.detail)}</textarea>
    </div>
  `).join('')
}

function renderSubplanImages(sp, i, j) {
  const images = sp.images || (sp.image ? [sp.image] : [])
  return images.map((url, k) => `
    <span class="gallery-item">
      <img src="${url}">
      <button onclick="removeSubplanImage(${i},${j},${k})">×</button>
    </span>
  `).join('')
}

function renderServiceImages(s, i) {
  const images = s.images || (s.image ? [s.image] : [])
  return images.map((url, j) => `
    <span class="gallery-item">
      <img src="${url}">
      <button onclick="removeServiceImage(${i},${j})">×</button>
    </span>
  `).join('')
}

function addService() {
  data.services = data.services || []
  data.services.push({ title: '', desc: '', images: [], detail: '' })
  renderServices()
}
function removeService(i) {
  data.services.splice(i, 1)
  renderServices()
}
function addSubplan(i) {
  data.services[i].subplans = data.services[i].subplans || []
  data.services[i].subplans.push({ title: '', image: '', detail: '' })
  renderServices()
}
function removeSubplan(i, j) {
  data.services[i].subplans.splice(j, 1)
  renderServices()
}
function addSubplanImage(ev, i, j) {
  uploadFile(ev.target.files[0], (url) => {
    const sp = data.services[i].subplans[j]
    sp.images = sp.images || (sp.image ? [sp.image] : [])
    sp.images.push(url)
    renderServices()
  })
}
function removeSubplanImage(i, j, k) {
  data.services[i].subplans[j].images.splice(k, 1)
  renderServices()
}
function uploadSubplanVideo(ev, i, j) {
  const file = ev.target.files[0]
  if (!file) return
  if (file.size > 20 * 1024 * 1024) {
    alert('動画のサイズが大きすぎます（20MB以下にしてください）')
    return
  }
  uploadFile(file, (url) => {
    data.services[i].subplans[j].video = url
    renderServices()
  })
}
function removeSubplanVideo(i, j) {
  data.services[i].subplans[j].video = ''
  renderServices()
}

function uploadServiceVideo(ev, i) {
  const file = ev.target.files[0]
  if (!file) return
  if (file.size > 20 * 1024 * 1024) {
    alert('動画のサイズが大きすぎます（20MB以下にしてください）')
    return
  }
  uploadFile(file, (url) => {
    data.services[i].video = url
    renderServices()
  })
}
function removeServiceVideo(i) {
  data.services[i].video = ''
  renderServices()
}

function addServiceImage(ev, i) {
  uploadFile(ev.target.files[0], (url) => {
    data.services[i].images = data.services[i].images || (data.services[i].image ? [data.services[i].image] : [])
    data.services[i].images.push(url)
    renderServices()
  })
}
function removeServiceImage(i, j) {
  data.services[i].images.splice(j, 1)
  renderServices()
}

function renderOptions() {
  const list = document.getElementById('optionList')
  list.innerHTML = (data.options || []).map((o, i) => `
    <div class="service-item">
      <button class="btn-danger" style="position:absolute;top:10px;right:10px;" onclick="removeOption(${i})">削除</button>
      <label>商品名</label>
      <input type="text" value="${esc(o.title)}" oninput="data.options[${i}].title=this.value">
      <label>料金</label>
      <input type="text" value="${esc(o.price)}" oninput="data.options[${i}].price=this.value">
      <label>説明</label>
      <textarea oninput="data.options[${i}].desc=this.value">${esc(o.desc)}</textarea>
      <label>写真</label>
      <input type="file" accept="image/*" onchange="uploadOptionImage(event,${i})">
      <img class="img-preview" src="${o.image || ''}">
    </div>
  `).join('')
}
function addOption() {
  data.options = data.options || []
  data.options.push({ title: '', price: '', desc: '', image: '' })
  renderOptions()
}
function removeOption(i) {
  data.options.splice(i, 1)
  renderOptions()
}
function uploadOptionImage(ev, i) {
  uploadFile(ev.target.files[0], (url) => {
    data.options[i].image = url
    renderOptions()
  })
}

function uploadImage(ev, key) {
  uploadFile(ev.target.files[0], (url) => {
    data[key] = url
    document.getElementById(key + 'Preview').src = url
  })
}

function toDataUrl(file, cb) {
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => cb(reader.result)
  reader.readAsDataURL(file)
}

// 写真はサーバー（Worker）に1枚ずつ送って、専用のURLをもらう方式に変更
// （これにより本文データが巨大にならず、保存エラーを防げます）
function uploadFile(file, cb) {
  if (!file) return
  toDataUrl(file, async (dataUrl) => {
    try {
      const res = await fetch(`${W}/api/image`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
        body: JSON.stringify({ dataUrl }),
      })
      const d = await res.json()
      if (d.ok) {
        cb(`${W}${d.url}`)
      } else {
        alert('画像のアップロードに失敗しました：' + (d.error || ''))
      }
    } catch (e) {
      alert('画像のアップロードに失敗しました（通信エラー）')
    }
  })
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') }

async function save() {
  data.heroTitle = document.getElementById('heroTitle').value
  data.heroText = document.getElementById('heroText').value
  data.aboutTitle = document.getElementById('aboutTitle').value
  data.aboutText = document.getElementById('aboutText').value
  data.lineUrl = document.getElementById('lineUrl').value
  data.instagramUrl = document.getElementById('instagramUrl').value
  data.notice = document.getElementById('notice').value

  const status = document.getElementById('status')
  status.textContent = '保存中…'
  try {
    const res = await fetch(`${W}/api/content`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Password': password },
      body: JSON.stringify(data),
    })
    const d = await res.json()
    status.textContent = d.ok ? '✅ 保存しました。サイトに反映されています。' : ('❌ ' + (d.error || '保存に失敗しました'))
  } catch (e) {
    status.textContent = '❌ 保存に失敗しました'
  }
}
</script>
</body>
</html>
